name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*.*.*', '*.*.*' ]
  pull_request:
    branches: [ main, develop ]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  go-build-test:
    name: Go - Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Disable Go workspace mode so commands operate only on the wsgrpc module.
      # This avoids trying to resolve example/server's dependency on a non-existent tag
      # github.com/helios57/NgGoRPC/wsgrpc v0.0.0 when go.work is present at repo root.
      GOWORK: off
    
    defaults:
      run:
        working-directory: ./wsgrpc
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: wsgrpc/go.sum
    
    - name: Download dependencies
      run: go mod download
    
    - name: Verify dependencies
      run: go mod verify
    
    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        working-directory: wsgrpc
    
    - name: Build
      run: go build -v ./...
    
    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v '/generated')
    
    - name: Display coverage
      run: go tool cover -func=coverage.out
    
    - name: Check coverage threshold
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 80" | bc -l) )); then
          echo "Error: Coverage ${COVERAGE}% is below the required 80% threshold"
          exit 1
        fi
        echo "Coverage check passed: ${COVERAGE}% >= 80%"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./wsgrpc/coverage.out
        flags: go
        name: go-coverage

  angular-build-test:
    name: Angular - Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm i
    
    - name: Lint
      run: npm run lint
    
    - name: Build library
      run: npm run build:lib
    
    - name: Run unit tests with coverage
      run: npm run test:coverage
    
    - name: Check coverage threshold
      run: |
        COVERAGE_FILE="coverage/client/coverage-summary.json"
        if [ -f "$COVERAGE_FILE" ]; then
          TOTAL_COVERAGE=$(cat $COVERAGE_FILE | jq '.total.lines.pct')
          echo "Total line coverage: ${TOTAL_COVERAGE}%"
          if (( $(echo "$TOTAL_COVERAGE < 80" | bc -l) )); then
            echo "Error: Coverage ${TOTAL_COVERAGE}% is below the required 80% threshold"
            exit 1
          fi
          echo "Coverage check passed: ${TOTAL_COVERAGE}% >= 80%"
        else
          echo "Warning: Coverage summary file not found at $COVERAGE_FILE"
          exit 1
        fi
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./frontend/coverage/client/lcov.info
        flags: angular
        name: angular-coverage
    
    - name: Build demo app
      run: npm run build:demo
    
    - name: Archive library artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-library
        path: frontend/dist/client/
        retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [go-build-test, angular-build-test]
    env:
      COMPOSE_BAKE: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker images
      run: docker compose build
    
    - name: Start services
      run: docker compose up -d
    
    - name: Wait for services to be ready
      run: |
        echo "Waiting for server to be ready..."
        timeout 60 bash -c 'until curl -f http://localhost:8080/health 2>/dev/null || curl -f http://localhost:8080 2>/dev/null; do sleep 2; done' || echo "Server health check skipped"
        # Frontend is published on host port 8352 (demo-app nginx -> :80); this is the
        # baseURL the Playwright tests hit. The previous :4200 poll always timed out.
        echo "Waiting for frontend to be ready..."
        timeout 90 bash -c 'until curl -f http://localhost:8352 2>/dev/null; do sleep 2; done' || echo "Frontend health check skipped"
        sleep 5
    
    - name: Run E2E tests
      working-directory: ./e2e-tests
      run: |
        # Run Playwright inside the official image (Chromium + all OS deps baked in,
        # version-matched to @playwright/test@1.57.0). This deliberately avoids
        # `npx playwright install` on the host: its browser download reliably hangs
        # after reaching 100% (post-download extraction never returns), which used to
        # hold the runner for the full 6h job limit.
        #   --network host  -> reach compose-published services on localhost
        #                      (frontend :8352, backend :8080)
        #   --ipc=host      -> recommended for Chromium in Docker (avoids /dev/shm crashes)
        # The docker socket + CLI + group are mounted in because the network-resilience
        # specs shell out to `docker stop/start nggorpc-backend` to simulate outages.
        DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
        docker run --rm --network host --ipc=host \
          -u "$(id -u):$(id -g)" \
          --group-add "$DOCKER_GID" \
          -e HOME=/work \
          -e CI=true \
          -e BASE_URL=http://localhost:8352 \
          -v "$PWD":/work -w /work \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v /usr/bin/docker:/usr/bin/docker:ro \
          mcr.microsoft.com/playwright:v1.57.0-noble \
          sh -c "npm ci && npx playwright test"
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: e2e-tests/playwright-report/
        retention-days: 30
    
    - name: Display service logs on failure
      if: failure()
      run: docker compose logs
    
    - name: Stop services
      if: always()
      run: docker compose down

  publish-npm:
    name: Publish to NPM
    needs: [e2e-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org'

    - name: Download library artifact
      uses: actions/download-artifact@v4
      with:
        name: client-library
        path: frontend/dist/client

    - name: Update version and publish
      working-directory: frontend/dist/client
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/}
        VERSION=${TAG_VERSION#v}
        echo "Updating version to $VERSION"
        npm pkg set version=$VERSION
        npm publish --provenance --access public
